<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="application-name" content="Polaris" />
    <meta name="description" content="Polaris 是一个能和 AI 对话，也会陪你一起长出样子的房间。" />
    <meta name="theme-color" content="#ffffff" />
    <meta property="og:site_name" content="Polaris" />
    <meta property="og:title" content="Polaris" />
    <meta property="og:description" content="一个能和 AI 对话，也会陪你一起长出样子的房间。" />
    <meta property="og:type" content="website" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="Polaris 北极星图标" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Polaris" />
    <meta name="twitter:description" content="一个能和 AI 对话，也会陪你一起长出样子的房间。" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Polaris" />
    <script>
      (() => {
        const storageKey = 'polaris-appearance-preference';
        const darkThemeColor = '#090b14';
        const lightThemeColor = '#ffffff';
        const readSystemAppearance = () => {
          if (typeof window.matchMedia !== 'function') return 'light';
          return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        };

        let preference = 'system';
        try {
          const storedPreference = window.localStorage.getItem(storageKey);
          if (storedPreference === 'light' || storedPreference === 'dark' || storedPreference === 'system') {
            preference = storedPreference;
          }
        } catch {
          preference = 'system';
        }

        const resolvedAppearance = preference === 'system' ? readSystemAppearance() : preference;
        const root = document.documentElement;
        root.dataset.polarisAppearance = resolvedAppearance;
        root.dataset.polarisAppearancePreference = preference;
        root.style.colorScheme = resolvedAppearance;

        const themeColor = document.head.querySelector('meta[name="theme-color"]');
        if (themeColor) {
          themeColor.setAttribute('content', resolvedAppearance === 'dark' ? darkThemeColor : lightThemeColor);
        }
      })();
    </script>
    <style>
      :root {
        color-scheme: light;
        --polaris-boot-bg: #ffffff;
        --polaris-boot-star-aura: radial-gradient(circle, rgba(142, 223, 255, 0.22), rgba(216, 185, 255, 0.12) 44%, rgba(246, 167, 207, 0) 72%);
        --polaris-boot-star: linear-gradient(135deg, #8edfff 0%, #aeb8ff 32%, #dec2ff 55%, #f5c3d5 74%, #f5d79a 100%);
        --polaris-boot-star-shadow: drop-shadow(0 0 14px rgba(174, 184, 255, 0.42));
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --polaris-boot-bg: #090b14;
          --polaris-boot-star-aura: radial-gradient(circle, rgba(142, 223, 255, 0.18), rgba(216, 185, 255, 0.12) 44%, rgba(246, 167, 207, 0) 72%);
          --polaris-boot-star: linear-gradient(135deg, #87e0ff 0%, #9aa8ff 32%, #c7a7ff 55%, #f0a5c6 74%, #f2cb82 100%);
          --polaris-boot-star-shadow: drop-shadow(0 0 18px rgba(142, 223, 255, 0.34));
        }
      }

      html[data-polaris-appearance='light'] {
        color-scheme: light;
        --polaris-boot-bg: #ffffff;
        --polaris-boot-star-aura: radial-gradient(circle, rgba(142, 223, 255, 0.22), rgba(216, 185, 255, 0.12) 44%, rgba(246, 167, 207, 0) 72%);
        --polaris-boot-star: linear-gradient(135deg, #8edfff 0%, #aeb8ff 32%, #dec2ff 55%, #f5c3d5 74%, #f5d79a 100%);
        --polaris-boot-star-shadow: drop-shadow(0 0 14px rgba(174, 184, 255, 0.42));
      }

      html[data-polaris-appearance='dark'] {
        color-scheme: dark;
        --polaris-boot-bg: #090b14;
        --polaris-boot-star-aura: radial-gradient(circle, rgba(142, 223, 255, 0.18), rgba(216, 185, 255, 0.12) 44%, rgba(246, 167, 207, 0) 72%);
        --polaris-boot-star: linear-gradient(135deg, #87e0ff 0%, #9aa8ff 32%, #c7a7ff 55%, #f0a5c6 74%, #f2cb82 100%);
        --polaris-boot-star-shadow: drop-shadow(0 0 18px rgba(142, 223, 255, 0.34));
      }

      html,
      body,
      #root {
        background-color: var(--polaris-boot-bg);
      }

      body {
        margin: 0;
        overflow: hidden;
      }

      #root:empty {
        position: relative;
        min-height: 100vh;
        min-height: 100dvh;
        background: var(--polaris-boot-bg);
      }

      #root:empty::before,
      #root:empty::after {
        content: "";
        position: fixed;
        left: 50%;
        top: 50%;
        pointer-events: none;
      }

      #root:empty::before {
        width: 48px;
        height: 48px;
        margin: -24px 0 0 -24px;
        border-radius: 999px;
        background: var(--polaris-boot-star-aura);
        animation: startupStarBreath 1.8s ease-in-out infinite;
      }

      #root:empty::after {
        width: 36px;
        height: 36px;
        margin: -18px 0 0 -18px;
        background: var(--polaris-boot-star);
        clip-path: polygon(50% 16.67%, 57.5% 42.5%, 83.33% 50%, 57.5% 57.5%, 50% 83.33%, 42.5% 57.5%, 16.67% 50%, 42.5% 42.5%);
        filter: var(--polaris-boot-star-shadow);
        animation: startupStarTurn 1.8s cubic-bezier(0.62, 0, 0.16, 1) infinite;
      }

      @keyframes startupStarTurn {
        0% { transform: rotate(0deg) scale(0.92); opacity: 0.78; }
        14% { opacity: 1; }
        58% { transform: rotate(360deg) scale(1); opacity: 1; }
        76% { transform: rotate(360deg) scale(0.94); opacity: 0.86; }
        100% { transform: rotate(360deg) scale(0.92); opacity: 0.78; }
      }

      @keyframes startupStarBreath {
        0%, 100% { transform: scale(0.78); opacity: 0.42; }
        48% { transform: scale(1.18); opacity: 0.78; }
      }
    </style>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/polaris-icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>Polaris</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
